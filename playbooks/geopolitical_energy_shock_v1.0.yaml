playbook_id: PB_GEOPOLITICAL_ENERGY_SHOCK_001
version: "1.0"
linked_scenarios:
  - KOR_SEMI_RATE_SHOCK_BEAR
activation:
  emergency_level_min: E4
  required_confirmation:
    - energy_move_confirmed
allowed_actions:
  - raise_cash_buffer
  - review_supplier_exposure
forbidden_actions:
  - headline_only_full_liquidation
  - unverified_rumor_trade
  - llm_direct_trade_decision
cooldown:
  min_review_interval: "1 trading day"
  reentry_requires:
    - energy_price_stabilization
