playbook_id: PB_KOR_SEMI_REVISION_DETERIORATION_V2
version: "2.0"
description: Review-only response for revision and margin deterioration.
linked_scenarios:
  - KOR_SEMI_BEAR_REVISION_DETERIORATION_V2
activation:
  emergency_level_min: E1
  required_confirmation:
    - revision_deterioration_confirmed
allowed_actions:
  - no_new_buy_review
  - reduce_risk_review
  - close_review_required
  - update_thesis_watchlist
  - request_human_review
  - do_not_auto_trade
forbidden_actions:
  - broker_order
  - auto_trade
  - live_buy_sell_order
  - llm_direct_trade_decision
cooldown:
  min_review_interval: "1 week"
  reentry_requires:
    - revision_breadth_recovery
    - close_review_completed
no_auto_trade: true
